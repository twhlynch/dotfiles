# black formatter
[tool.black]
line-length = 88
target-version = ['py313']

# ruff linter
[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = [
	"E",    # pycodestyle errors
	"F",    # pyflakes
	"I",    # import sorting
	"UP",   # pyupgrade
	"B",    # bugbear
	"SIM",  # simplify
	"W",    # pycodestyle warnings
	"N",    # pep8 naming
	"YTT",  # flake8
	"ANN",  # annotations
	"A",    # builtins
	"C4",   # comprehensions
	"ICN",  # import conventions
	"LOG",  # logger
	"PIE",  # misc
	"PT",   # pytest
	"RET",  # return
	"TC",   # type checking
	"FLY",  # fstrings
	"PERF", # performance
	"PL",   # pylint
	"FURB", # refurb
	"RUF",  # ruff
]
ignore = [
	"E501",    # Line too long
	"PLR2004", # Magic value used in comparison
	"ANN401",  # typing.Any disallowed
	"RET504",  # Unnecessary assignment before return
]

# basedpyright lsp
[tool.pyright]
typeCheckingMode = "all"

reportMissingImports = true
reportUnusedVariable = true
reportUnusedImport = true

reportAny = false
reportExplicitAny = false

reportImplicitRelativeImport = false

